<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./public/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Tank Clean Machaa! - Bangalore's trusted water tank cleaning company. Overhead, underground, drum cleaning & sanitization. Call Ganesh: +91 90145 38584" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: { blue: '#0B4DAB', green: '#8CCB00' } },
            fontFamily: { sans: ['Outfit', 'Inter', 'sans-serif'] }
          }
        }
      }
    </script>
    <style type="text/tailwindcss">
      @layer base { html { scroll-behavior: smooth; } }
      @layer utilities {
        .bg-glass {
          background: rgba(255, 255, 255, 0.88);
          backdrop-filter: blur(14px);
          -webkit-backdrop-filter: blur(14px);
          border-bottom: 1px solid rgba(255,255,255,0.25);
        }
      }
    </style>
    <style>
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
      @keyframes fadeIn { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }
      .animate-fade-in { animation: fadeIn 0.65s cubic-bezier(0.16,1,0.3,1) forwards; }
      input[type=range]::-webkit-slider-thumb { background: #0B4DAB; }
      input[type=range]::-moz-range-thumb { background: #0B4DAB; }

      /* ═══ 3D Hero Logo Animations ═══ */
      @keyframes logo3dFloat {
        0% {
          transform: translateY(0) rotateY(0deg) rotateX(0deg) scale(1);
          filter: drop-shadow(0 20px 40px rgba(11, 77, 171, 0.25));
        }
        15% {
          transform: translateY(-12px) rotateY(6deg) rotateX(3deg) scale(1.015);
          filter: drop-shadow(12px 28px 45px rgba(11, 77, 171, 0.3));
        }
        30% {
          transform: translateY(-22px) rotateY(10deg) rotateX(-2deg) scale(1.03);
          filter: drop-shadow(18px 35px 50px rgba(11, 77, 171, 0.35));
        }
        50% {
          transform: translateY(-28px) rotateY(0deg) rotateX(-4deg) scale(1.04);
          filter: drop-shadow(0 40px 55px rgba(11, 77, 171, 0.38));
        }
        70% {
          transform: translateY(-22px) rotateY(-10deg) rotateX(2deg) scale(1.03);
          filter: drop-shadow(-18px 35px 50px rgba(11, 77, 171, 0.35));
        }
        85% {
          transform: translateY(-12px) rotateY(-6deg) rotateX(-3deg) scale(1.015);
          filter: drop-shadow(-12px 28px 45px rgba(11, 77, 171, 0.3));
        }
        100% {
          transform: translateY(0) rotateY(0deg) rotateX(0deg) scale(1);
          filter: drop-shadow(0 20px 40px rgba(11, 77, 171, 0.25));
        }
      }

      @keyframes glowPulse {
        0%, 100% {
          transform: scale(0.92);
          opacity: 0.3;
          box-shadow: 0 0 40px 15px rgba(11, 77, 171, 0.15), 0 0 80px 30px rgba(140, 203, 0, 0.08);
        }
        50% {
          transform: scale(1.08);
          opacity: 0.55;
          box-shadow: 0 0 60px 25px rgba(11, 77, 171, 0.25), 0 0 120px 50px rgba(140, 203, 0, 0.12);
        }
      }

      @keyframes orbitDrop1 {
        0%   { transform: rotate(0deg)   translateX(200px) rotate(0deg)   scale(0.8); opacity: 0.7; }
        25%  { transform: rotate(90deg)  translateX(210px) rotate(-90deg)  scale(1);   opacity: 1;   }
        50%  { transform: rotate(180deg) translateX(195px) rotate(-180deg) scale(0.9); opacity: 0.8; }
        75%  { transform: rotate(270deg) translateX(215px) rotate(-270deg) scale(1.1); opacity: 0.9; }
        100% { transform: rotate(360deg) translateX(200px) rotate(-360deg) scale(0.8); opacity: 0.7; }
      }

      @keyframes orbitDrop2 {
        0%   { transform: rotate(120deg) translateX(175px) rotate(-120deg) scale(1);   opacity: 0.6; }
        50%  { transform: rotate(300deg) translateX(185px) rotate(-300deg) scale(0.7); opacity: 1;   }
        100% { transform: rotate(480deg) translateX(175px) rotate(-480deg) scale(1);   opacity: 0.6; }
      }

      @keyframes orbitDrop3 {
        0%   { transform: rotate(240deg) translateX(190px) rotate(-240deg) scale(0.9); opacity: 0.5; }
        50%  { transform: rotate(420deg) translateX(205px) rotate(-420deg) scale(1.2); opacity: 0.9; }
        100% { transform: rotate(600deg) translateX(190px) rotate(-600deg) scale(0.9); opacity: 0.5; }
      }

      @keyframes shimmer {
        0%   { transform: translateX(-100%) rotate(25deg); }
        100% { transform: translateX(200%) rotate(25deg); }
      }

      @keyframes splashIn {
        0%   { transform: scale(0.3) rotate(-10deg); opacity: 0; }
        60%  { transform: scale(1.06) rotate(2deg); opacity: 1; }
        80%  { transform: scale(0.97) rotate(-1deg); opacity: 1; }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
      }

      .logo-3d-wrapper {
        perspective: 1200px;
        perspective-origin: center center;
      }

      .logo-3d {
        transform-style: preserve-3d;
        animation: logo3dFloat 8s cubic-bezier(0.37, 0, 0.63, 1) infinite, splashIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        will-change: transform, filter;
        transition: transform 0.3s ease-out;
      }

      .logo-3d:hover {
        animation-play-state: paused;
        transform: translateY(-15px) rotateY(15deg) rotateX(-8deg) scale(1.06);
        filter: drop-shadow(20px 40px 60px rgba(11, 77, 171, 0.45));
      }

      .logo-glow-ring {
        animation: glowPulse 4s ease-in-out infinite;
        background: radial-gradient(circle, rgba(11, 77, 171, 0.4) 0%, rgba(140, 203, 0, 0.2) 60%, transparent 100%);
      }

      .logo-orbit-drop {
        position: absolute;
        top: 50%; left: 50%;
        width: 14px; height: 18px;
        margin-top: -9px; margin-left: -7px;
        pointer-events: none;
      }

      .logo-shimmer {
        position: absolute;
        inset: 0;
        overflow: hidden;
        border-radius: 50%;
        pointer-events: none;
      }
      .logo-shimmer::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 50%;
        height: 200%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        animation: shimmer 4s ease-in-out infinite;
        animation-delay: 2s;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased">

      /* ══════════════════════════════════════════════════
         STATS BAR
      ══════════════════════════════════════════════════ */

      /* ── WATER HEALTH QUIZ INNER COMPONENT ── */
      function WaterHealthQuiz({ onBook }) {
        const [step, setStep] = useState(0); // 0: start, 1: water type, 2: symptoms, 3: last clean, 4: results
        const [waterSource, setWaterSource] = useState('');
        const [symptoms, setSymptoms] = useState([]);
        const [lastCleaned, setLastCleaned] = useState('');

        const toggleSymptom = (s) => {
          if (symptoms.includes(s)) {
            setSymptoms(symptoms.filter(item => item !== s));
          } else {
            setSymptoms([...symptoms, s]);
          }
        };

        const getDiagnostics = () => {
          let score = 0;
          if (waterSource === 'borewell') score += 3;
          if (waterSource === 'mixed') score += 2;
          if (waterSource === 'municipal') score += 1;

          score += symptoms.length * 1.5;

          if (lastCleaned === 'never' || lastCleaned === 'over-year') score += 3;
          if (lastCleaned === '6-12-months') score += 1.5;
          if (lastCleaned === 'under-6') score += 0.5;

          if (score >= 6) {
            return {
              level: 'Critical Risk 🚨',
              color: 'text-red-600 bg-red-50 border-red-200',
              advice: 'Your water storage shows high vulnerability to microbial growth, heavy scaling, or sediment blockage. Immediate disinfection and cleaning is highly recommended.'
            };
          } else if (score >= 3.5) {
            return {
              level: 'Moderate Contamination Risk ⚠️',
              color: 'text-yellow-600 bg-yellow-50 border-yellow-200',
              advice: 'Signs of dust deposits, minor scaling, or bacterial stagnation. A standard 6-stage sanitization sweep is recommended to protect your plumbing and household health.'
            };
          } else {
            return {
              level: 'Low Risk / Maintenance Needed ✅',
              color: 'text-green-600 bg-green-50 border-green-200',
              advice: 'Your tank is in relatively healthy shape. We suggest a standard maintenance cleaning every 6 months to maintain this safety standard.'
            };
          }
        };

        const results = getDiagnostics();

        return (
          <div className="max-w-3xl mx-auto bg-gradient-to-br from-slate-900 to-blue-950 text-white rounded-3xl p-8 sm:p-12 shadow-2xl relative overflow-hidden font-sans">
            {/* Decorative clean water background wave */}
            <div className="absolute right-0 top-0 w-64 h-64 bg-blue-500/10 rounded-full filter blur-3xl pointer-events-none"></div>

            {step === 0 && (
              <div className="text-center space-y-6 relative z-10 py-4">
                <span className="text-xs font-bold text-[#8CCB00] uppercase tracking-widest bg-[#8CCB00]/10 border border-[#8CCB00]/20 px-3.5 py-1.5 rounded-full font-sans">
                  ✦ Water Quality Audit
                </span>
                <h3 className="text-3xl font-extrabold tracking-tight font-sans">
                  Water Tank Health Diagnostic Quiz
                </h3>
                <p className="text-blue-100 text-sm max-w-lg mx-auto leading-relaxed font-sans">
                  Answer 3 quick questions about your home water utility to diagnose scaling, sediment depth, and bacterial safety levels instantly.
                </p>
                <button
                  onClick={() => setStep(1)}
                  className="bg-[#8CCB00] hover:bg-[#78ad00] text-white font-bold py-3.5 px-8 rounded-full shadow-lg hover:shadow-xl transition-all duration-300 inline-flex items-center space-x-2 font-sans text-sm"
                >
                  <span>Start Diagnostic Audit</span>
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 5l7 7-7 7"/>
                  </svg>
                </button>
              </div>
            )}

            {step === 1 && (
              <div className="space-y-6 relative z-10 font-sans">
                <div className="flex justify-between items-center text-xs font-bold uppercase tracking-wider text-blue-300">
                  <span>Question 1 of 3</span>
                  <span>Water Utility Source</span>
                </div>
                <h4 className="text-2xl font-bold font-sans">What is the primary source of water in your building?</h4>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 pt-2">
                  {[
                    { id: 'municipal', title: 'Kaveri/Municipal Water', desc: 'Chlorinated, but carries supply-line mud & rust' },
                    { id: 'borewell', title: 'Borewell Utility', desc: 'High mineral hardness, calcium deposits & scale' },
                    { id: 'mixed', title: 'Mixed / Tanker Water', desc: 'Varying source quality, high particulate risk' }
                  ].map(source => (
                    <button
                      key={source.id}

                <div className="flex justify-end pt-4">

                  >
                    Continue to Last Question
                  </button>
                </div>
              </div>
            )}

            {step === 3 && (
              <div className="space-y-6 relative z-10 font-sans">
                <div className="flex justify-between items-center text-xs font-bold uppercase tracking-wider text-blue-300">
                  <span>Question 3 of 3</span>
                  <span>Sanitation History</span>

                    { id: 'over-year', title: 'Over 1 Year / Never', desc: 'High accumulation danger' }
                  ].map(option => (
                    <button
                      key={option.id}

                    >
                      <span className="font-bold text-base block text-white font-sans">{option.title}</span>
                      <span className="text-xs text-blue-200 block mt-2 leading-relaxed font-sans">{option.desc}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {step === 4 && (
              <div className="space-y-6 relative z-10 py-2 font-sans">

                  </p>
                </div>

                <div className="flex flex-col sm:flex-row items-center justify-center gap-3 pt-4 font-sans">
                  <button

                    className="w-full sm:w-auto bg-[#8CCB00] hover:bg-[#78ad00] text-white font-bold py-3.5 px-8 rounded-full shadow-lg hover:shadow-xl transition-all font-sans text-sm"

            return {
              rating: "Excellent (Safe) ✅",
              color: "text-green-600 bg-green-50 border-green-200",
              advice: "Water is soft and highly pure. Sump cleaning recommended once every 6 months to prevent micro-sediment accumulation."

            return {
              rating: "Good (Acceptable) 👍",
              color: "text-[#0B4DAB] bg-blue-50 border-blue-200",
              advice: "Safe for household utility. Clean every 6 months to maintain this standard and prevent scaling."
            };
          } else if (value <= 500) {
            return {
              rating: "Hard Water / Moderate Risk ⚠️",
              color: "text-yellow-600 bg-yellow-50 border-yellow-200",
              advice: "Mineral deposits and white scaling will accumulate rapidly. Sump and tank cleaning recommended every 4-5 months."
            };
          } else {
            return {
              rating: "Critical Hardness / High Risk 🚨",
              color: "text-red-600 bg-red-50 border-red-200",
              advice: "Dangerous scaling, rust risk, and high sediment buildup. Sump cleaning is recommended every 3 months. Consider a water softener."
            };
          }
        };

        const tdsResult = getTdsAdvice(tds);

        const generateSchedule = (e) => {
          e.preventDefault();
          const deepCleanInterval = waterSource === 'borewell' ? 4 : 6;
          const testInterval = 3;
          const meshCheckInterval = 2;

          const list = [];

          const months = [
            "January", "February", "March", "April", "May", "June", 
            "July", "August", "September", "October", "November", "December"
          ];

          for (let i = 1; i <= 12; i++) {
            const currentMonthIndex = (baseMonth + i) % 12;
            const mName = months[currentMonthIndex];
            const items = [];

            if (i % deepCleanInterval === 0) {
              items.push("🚿 Professional Sump Deep Clean & Disinfection (Tank Clean Machaa!)");
            }
            if (i % testInterval === 0) {
              items.push("🔬 Water TDS & pH level health test");
            }
            if (i % meshCheckInterval === 0) {
              items.push("🧹 Clean water inlet mesh filter & check float valve functionality");
            }

            if (items.length > 0) {
              list.push({ month: mName, tasks: items });
            }
          }
          setSchedule(list);
          setGenerated(true);
        };

                    <p className="text-slate-500 text-xs mt-1 font-sans">Generate a custom hygiene calendar for your storage structure.</p>
                  </div>

                  <form onSubmit={generateSchedule} className="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-6">
                    <div>
                      <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1.5 font-sans">Building Type</label>
                      <select
                        value={sumpType}
                        onChange={(e) => setSumpType(e.target.value)}
                        className="w-full bg-white border border-slate-200 rounded-xl px-3 py-2.5 text-xs text-slate-800 focus:outline-none focus:ring-1 focus:ring-[#0B4DAB] font-sans"
                      >
                        <option value="individual">Individual Sump</option>
                        <option value="apartment">Apartment Society</option>
                        <option value="commercial">Commercial Hub</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1.5 font-sans">Water Source</label>
                      <select
                        value={waterSource}
                        onChange={(e) => setWaterSource(e.target.value)}
                        className="w-full bg-white border border-slate-200 rounded-xl px-3 py-2.5 text-xs text-slate-800 focus:outline-none focus:ring-1 focus:ring-[#0B4DAB] font-sans"
                      >
                        <option value="municipal">Kaveri / Municipal</option>
                        <option value="borewell">Borewell Utility</option>
                        <option value="mixed">Mixed Tankers</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1.5 font-sans">Sump Capacity</label>
                      <select
                        value={capacity}
                        onChange={(e) => setCapacity(Number(e.target.value))}
                        className="w-full bg-white border border-slate-200 rounded-xl px-3 py-2.5 text-xs text-slate-800 focus:outline-none focus:ring-1 focus:ring-[#0B4DAB] font-sans"
                      >
                        <option value="1000">1,000 Litres</option>
                        <option value="2000">2,000 Litres</option>
                        <option value="5000">5,000 Litres</option>
                        <option value="10000">10,000+ Litres</option>
                      </select>
                    </div>

                    <div className="sm:col-span-3 pt-2">
                      <button
                        type="submit"
                        className="w-full bg-[#8CCB00] hover:bg-[#78ad00] text-white font-bold py-3 px-6 rounded-xl shadow-md text-xs transition-all font-sans"
                      >
                        Generate 12-Month Maintenance Calendar
                      </button>
                    </div>
                  </form>

                  {generated && (
                    <div className="mt-8 pt-8 border-t border-slate-200/50 space-y-4">
                      <div className="flex justify-between items-center">
                        <h4 className="text-sm font-bold text-slate-800 font-sans">Your Generated Calendar</h4>
                        <button
                          onClick={() => window.print()}
                          className="text-[10px] font-bold text-[#0B4DAB] hover:underline font-sans"
                        >
                          🖨 Print / Save Notice
                        </button>
                      </div>

                      <div className="space-y-2.5 max-h-60 overflow-y-auto pr-1">
                        {schedule.map((item, idx) => (
                          <div key={idx} className="bg-white border border-slate-100 rounded-xl p-4 space-y-2 shadow-xs">
                            <span className="text-xs font-bold text-[#0B4DAB] bg-blue-50 px-2 py-0.5 rounded-md font-sans">
                              {item.month}
                            </span>
                            <ul className="space-y-1.5">
                              {item.tasks.map((task, i) => (
                                <li key={i} className="text-xs text-slate-600 flex items-start font-sans">
                                  <span className="text-[#8CCB00] mr-1.5 shrink-0">✦</span>
                                  <span>{task}</span>
                                </li>
                              ))}
                            </ul>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </section>
        );
      }

      /* ══════════════════════════════════════════════════

      function App() {

        const book = (id='') => {
          setSelected(id);
          const el = document.getElementById('booking');
          if(el) el.scrollIntoView({ behavior:'smooth' });
        };
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col">
            <Navbar onBookClick={()=>book()} />
            <main className="flex-grow">
              <Hero onBookClick={()=>book()} />
              <StatsBar />
              <Services onBookClick={book} />
              <WhyChooseUs />
              <Pricing onBookClick={book} />

            </main>
            <Footer onBookClick={()=>book()} />
            <FloatingActions />
          </div>
        );

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
